services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: censo_db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-censo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-censo_pacientes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-censo_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  app:
    build: .
    container_name: censo_app_container
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      FERNET_KEY: ${FERNET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy

  # Frontend React
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: censo_frontend_container
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - app

volumes:
  postgres_data: